name: Fetch Insights

# When this runs:
# - Schedule: ~8 PM ET Mon–Fri night (drifts ±1h with DST; acceptable for our 11h overnight window).
#   `0 0 * * 2-6` → Tue–Sat at 00:00 UTC = Mon–Fri at 20:00 EDT (or 19:00 EST).
# - Manual: workflow_dispatch with optional --ticker / --limit / --dry-run for testing.
#
# Output: writes a row to `stock_insights` per active stock, top-3 articles to
# `insight_articles`, per-source audit to `stock_insight_sources`, and a lifecycle
# entry in `pipeline_runs`. Sentry catches any unhandled exceptions.

on:
  schedule:
    - cron: "0 0 * * 2-6"
  workflow_dispatch:
    inputs:
      ticker:
        description: "Limit to a single ticker (e.g. NVDA). Leave empty for full batch."
        required: false
        type: string
      limit:
        description: "Process only first N stocks (testing)."
        required: false
        type: string
      dry_run:
        description: "Skip DB writes — print computed payloads only."
        required: false
        type: boolean
        default: false

concurrency:
  group: fetch-insights
  cancel-in-progress: false # never kill a run mid-flight

jobs:
  fetch:
    name: Fetch + compute insights
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 45

    env:
      # Supabase
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      # Paid data
      MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}
      HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}

      # Free data
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

      # Optional (Week 2+) — pipeline degrades gracefully if absent
      REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
      REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
      REDDIT_USER_AGENT: ${{ secrets.REDDIT_USER_AGENT }}
      MARKETWATCH_SESSION_COOKIE: ${{ secrets.MARKETWATCH_SESSION_COOKIE }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

      # Behavior
      PIPELINE_LOG_LEVEL: INFO

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Print pipeline plan
        run: |
          echo "::group::Run parameters"
          echo "ticker:  ${{ inputs.ticker || '(all)' }}"
          echo "limit:   ${{ inputs.limit || '(none)' }}"
          echo "dry_run: ${{ inputs.dry_run || 'false' }}"
          echo "::endgroup::"

      - name: Run pipeline
        run: |
          ARGS=""
          if [ -n "${{ inputs.ticker }}" ]; then ARGS="$ARGS --ticker ${{ inputs.ticker }}"; fi
          if [ -n "${{ inputs.limit }}"  ]; then ARGS="$ARGS --limit  ${{ inputs.limit  }}"; fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          echo "running: python -m pipeline.fetch_insights $ARGS"
          python -m pipeline.fetch_insights $ARGS

      - name: Summary
        if: always()
        run: |
          echo "### Pipeline run" >> $GITHUB_STEP_SUMMARY
          echo "- Trigger: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Status:  ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- Ticker:  ${{ inputs.ticker || '(all)' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Dry run: ${{ inputs.dry_run || 'false' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit:  ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Inspect rows: [pipeline_runs](https://supabase.com/dashboard/project/${{ secrets.SUPABASE_PROJECT_REF }}/editor?ref=pipeline_runs)" >> $GITHUB_STEP_SUMMARY

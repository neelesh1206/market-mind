name: Fetch Insights

# When this runs:
# - Triggered EXTERNALLY by the Cloudflare Worker at `workers/cron-trigger/`
#   on the schedule `0 0 * * 2-6` UTC (= 20:00 ET Mon–Fri). See ADR 0016 for
#   why we moved off `schedule:` here — GH Actions cron drift was multi-hour
#   on free tier, CF Workers cron is reliable within ~1 min.
# - Manual: workflow_dispatch with optional --ticker / --limit / --dry-run for testing.
#
# Output: writes a row to `stock_insights` per active stock, top-3 articles to
# `insight_articles`, per-source audit to `stock_insight_sources`, and a lifecycle
# entry in `pipeline_runs`. Sentry catches any unhandled exceptions.

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: "Limit to a single ticker (e.g. NVDA). Leave empty for full batch."
        required: false
        type: string
      limit:
        description: "Process only first N stocks (testing)."
        required: false
        type: string
      dry_run:
        description: "Skip DB writes — print computed payloads only."
        required: false
        type: boolean
        default: false

concurrency:
  group: fetch-insights
  cancel-in-progress: false # never kill a run mid-flight

jobs:
  fetch:
    name: Fetch + compute insights
    runs-on: ubuntu-latest
    environment: production
    # 60 min: gives headroom for the one-time FinBERT model warm-up on a
    # fresh runner (~30s after cache, ~3 min cold) plus the LLM
    # summarizer/reasoner which still go over the network. Most runs land
    # well under 30 min once the HF model cache is warm.
    timeout-minutes: 60

    env:
      # Supabase
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      # Paid data
      MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}
      HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
      # Optional override: pick a different summarizer model.
      # Default (set in code): mistralai/Mistral-7B-Instruct-v0.3 — works on free tier.
      # Recommended after Pro + license acceptance: meta-llama/Meta-Llama-3.1-8B-Instruct
      HUGGINGFACE_SUMMARY_MODEL: ${{ secrets.HUGGINGFACE_SUMMARY_MODEL }}
      # Optional override: force a specific Inference provider.
      # Use this when the default model is gated to paid providers
      # (Llama-3+, etc.). Valid values: together, fireworks-ai, nebius,
      # sambanova, cerebras, hyperbolic, novita, replicate, hf-inference,
      # cohere, openai, fal-ai, black-forest-labs.
      # Leave unset to use HF's auto routing.
      HUGGINGFACE_PROVIDER: ${{ secrets.HUGGINGFACE_PROVIDER }}

      # Free data
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

      # Optional (Week 2+) — pipeline degrades gracefully if absent
      REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
      REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
      REDDIT_USER_AGENT: ${{ secrets.REDDIT_USER_AGENT }}
      MARKETWATCH_SESSION_COOKIE: ${{ secrets.MARKETWATCH_SESSION_COOKIE }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

      # Behavior
      PIPELINE_LOG_LEVEL: INFO

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        # CPU-only torch wheel comes from PyTorch's index. The extra-index
        # is consulted only when a matching wheel isn't on PyPI, so the
        # rest of the requirements still resolve from PyPI as usual.
        run: pip install --extra-index-url https://download.pytorch.org/whl/cpu -r pipeline/requirements.txt

      - name: Cache HuggingFace model files
        # FinBERT (~440 MB) downloads to ~/.cache/huggingface on first
        # load; caching it across runs keeps the warm-up to ~30s instead
        # of the ~3 min cold pull. Key is content-addressed by the
        # sentiment processor + requirements so a model bump invalidates
        # the cache automatically.
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ hashFiles('pipeline/processors/sentiment.py', 'pipeline/requirements.txt') }}
          restore-keys: |
            hf-models-

      - name: Print pipeline plan
        run: |
          echo "::group::Run parameters"
          echo "ticker:  ${{ inputs.ticker || '(all)' }}"
          echo "limit:   ${{ inputs.limit || '(none)' }}"
          echo "dry_run: ${{ inputs.dry_run || 'false' }}"
          echo "::endgroup::"

      - name: Run pipeline
        run: |
          ARGS=""
          if [ -n "${{ inputs.ticker }}" ]; then ARGS="$ARGS --ticker ${{ inputs.ticker }}"; fi
          if [ -n "${{ inputs.limit }}"  ]; then ARGS="$ARGS --limit  ${{ inputs.limit  }}"; fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          echo "running: python -m pipeline.fetch_insights $ARGS"
          python -m pipeline.fetch_insights $ARGS

      - name: Summary
        if: always()
        run: |
          echo "### Pipeline run" >> $GITHUB_STEP_SUMMARY
          echo "- Trigger: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Status:  ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- Ticker:  ${{ inputs.ticker || '(all)' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Dry run: ${{ inputs.dry_run || 'false' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit:  ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Inspect rows: [pipeline_runs](https://supabase.com/dashboard/project/${{ secrets.SUPABASE_PROJECT_REF }}/editor?ref=pipeline_runs)" >> $GITHUB_STEP_SUMMARY

name: Refresh Eligible Universe

# Pre-loads `universe_eligible_stocks` table — the set of tickers users
# can request additions from on /stocks → Request tab. See ADR 0018.
#
# When this runs:
# - Manual: workflow_dispatch with optional --dry-run / --limit for testing
# - Scheduled: Cloudflare Worker cron fires this weekly via
#   GitHub's REST API (Sunday 04:00 UTC = ~midnight ET). The CF worker
#   is the single source of truth for cron timing (see ADR 0016).
#
# Output: writes/upserts rows into `universe_eligible_stocks` and logs
# lifecycle to `pipeline_runs`. The first run is a bootstrap that takes
# ~3h 20m (full 12K-ticker scan); steady-state weekly runs are ~30-45m.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Skip DB writes — print what would change."
        required: false
        type: boolean
        default: false
      limit:
        description: "Process only first N candidate symbols (smoke testing)."
        required: false
        type: string

concurrency:
  group: refresh-eligible-universe
  cancel-in-progress: false

jobs:
  refresh:
    name: Refresh universe_eligible_stocks
    runs-on: ubuntu-latest
    environment: production
    # 240 min: bootstrap (first run) takes ~3h 20m at 60 calls/min for
    # ~12K US tickers. Steady-state weekly runs land in 30-45 min, well
    # under this ceiling.
    timeout-minutes: 240

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      # Market-cap threshold for eligibility. Default $2B aligns with the
      # ~top 2000 US equities. Bumpable here without a code change.
      STOCK_REQUEST_MIN_MARKET_CAP_USD: "2000000000"
      PIPELINE_LOG_LEVEL: INFO

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        # Same CPU-torch + pip install pattern as the other pipeline jobs.
        # We don't actually USE torch in this script but the requirements
        # file is shared; installing only what we need would mean a separate
        # requirements.txt to maintain, not worth the cost.
        run: pip install --extra-index-url https://download.pytorch.org/whl/cpu -r pipeline/requirements.txt

      - name: Refresh universe
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          if [ -n "${{ inputs.limit }}" ]; then ARGS="$ARGS --limit ${{ inputs.limit }}"; fi
          echo "running: python -m pipeline.refresh_eligible_universe $ARGS"
          python -m pipeline.refresh_eligible_universe $ARGS

      - name: Summary
        if: always()
        run: |
          echo "### Universe refresh" >> $GITHUB_STEP_SUMMARY
          echo "- Trigger: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- Dry run: ${{ inputs.dry_run || 'false' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Limit: ${{ inputs.limit || '(none)' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

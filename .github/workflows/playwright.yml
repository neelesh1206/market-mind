name: Playwright Smoke

# Runs Playwright smoke tests against deployed builds, not a local dev server.
# Why: we want to catch production-bundle regressions (env-var inlining, OG
# edge runtime, hydration mismatches that only show in `next build` output)
# that a `next dev` server would mask.
#
# Trigger model:
#   - On PR: tests against the Vercel preview URL (the Vercel GitHub
#     integration posts the preview comment; we read it from the deployment
#     status API). Falls back to prod if no preview is ready.
#   - On push to main: tests against the production URL after Vercel has
#     promoted the new build.

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "pipeline/**"
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "pipeline/**"
  workflow_dispatch:
    inputs:
      target_url:
        description: "Override target URL (defaults to production)."
        required: false
        type: string

concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Public surface smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Wait for Vercel preview (PR + push)
        # Vercel posts a deployment-status with a URL once the build finishes
        # — works for both preview (PRs) and production (push to main). Without
        # this wait, push events race the deploy and we test the OLD bundle.
        # Up to 6 min; if it never lands we fall back to the prod URL below.
        id: vercel
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.2
        continue-on-error: true
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 360

      - name: Choose target URL
        id: target
        run: |
          if [ -n "${{ inputs.target_url }}" ]; then
            echo "url=${{ inputs.target_url }}" >> $GITHUB_OUTPUT
            echo "Using workflow input URL"
          elif [ -n "${{ steps.vercel.outputs.url }}" ]; then
            echo "url=${{ steps.vercel.outputs.url }}" >> $GITHUB_OUTPUT
            echo "Using Vercel-reported URL: ${{ steps.vercel.outputs.url }}"
          else
            echo "url=https://marketmind.neeleshkakaraparthi.dev" >> $GITHUB_OUTPUT
            echo "Falling back to production URL"
          fi

      - name: Verify deploy actually serves the new build
        # Belt + suspenders: even after the deployment-status fires, the CDN
        # can take ~30s to propagate. Poll a known route until it serves the
        # expected content-type. Catches the race where Vercel reports
        # "deployment ready" but the edge node we hit is still serving the
        # previous build. Bails after 90s; tests will then catch any real
        # regression as before.
        env:
          TARGET: ${{ steps.target.outputs.url }}
        run: |
          for i in {1..18}; do
            ct=$(curl -sI "${TARGET}/og/stock/AAPL" | grep -i '^content-type:' | head -1 | tr -d '\r' || true)
            if echo "$ct" | grep -qi "image/png"; then
              echo "Deploy live (attempt $i): $ct"
              exit 0
            fi
            echo "Attempt $i: $ct — waiting 5s..."
            sleep 5
          done
          echo "::warning::OG endpoint never returned image/png after 90s; running tests anyway."

      - name: Run Playwright
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.target.outputs.url }}
        run: npx playwright test --project=chromium

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

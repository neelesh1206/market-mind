name: Compute Leaderboard

# Snapshots the past week's leaderboard. Runs Sun 23:00 UTC — well after
# Friday's 21:15 UTC resolution job, before Monday's daily-bonus reset, so
# Mon-Fri's resolved bets are all in by the time we compute.

on:
  schedule:
    - cron: "0 23 * * 0"
  workflow_dispatch:
    inputs:
      week_start:
        description: "Monday of the target week (YYYY-MM-DD). Defaults to most recently completed week."
        required: false
        type: string
      dry_run:
        description: "Compute + log; don't write."
        required: false
        type: boolean
        default: false

concurrency:
  group: compute-leaderboard
  cancel-in-progress: false

jobs:
  compute:
    name: Compute weekly leaderboard snapshot
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 5

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      PIPELINE_LOG_LEVEL: INFO
      # Leaderboard uses only Supabase. Stub the others so config.py loads.
      MASSIVE_API_KEY: ""
      FINNHUB_API_KEY: ""
      FRED_API_KEY: ""
      HUGGINGFACE_API_KEY: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Compute snapshot
        run: |
          ARGS=""
          if [ -n "${{ inputs.week_start }}" ]; then ARGS="$ARGS --week-start ${{ inputs.week_start }}"; fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          echo "running: python -m pipeline.compute_leaderboard $ARGS"
          python -m pipeline.compute_leaderboard $ARGS

      - name: Summary
        if: always()
        run: |
          echo "### Leaderboard snapshot" >> $GITHUB_STEP_SUMMARY
          echo "- Status:     ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- Week start: ${{ inputs.week_start || '(most recently completed)' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Dry run:    ${{ inputs.dry_run || 'false' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Trigger:    ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY

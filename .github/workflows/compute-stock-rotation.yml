name: Compute Stock Rotation

# Weekly universe rotation — Phase 2 of ADR 0018.
#
# When this runs:
# - Manual: workflow_dispatch (with optional --dry-run / --skip-backfill)
# - Scheduled: Cloudflare Worker cron fires this Sunday 12:00 UTC.
#   The CF worker is the single source of truth for cron timing (ADR 0016).
#
# Output:
# - Demotes stocks with zero watchlists AND zero bets/30d
# - Promotes top-voted requests (>=3 unique votes) that pass Finnhub validation
# - Always maintains exactly 50 active stocks (promote N = demote N)
# - Records audit rows in stock_rotations
# - Backfills insights for newly-promoted stocks (subprocess fetch_insights
#   per new ticker — ~30s FinBERT cold start × N new stocks)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Skip DB writes — log what would change."
        required: false
        type: boolean
        default: false
      skip_backfill:
        description: "Skip fetch_insights subprocess for newly-promoted stocks (smoke test only)."
        required: false
        type: boolean
        default: false

concurrency:
  group: compute-stock-rotation
  cancel-in-progress: false

jobs:
  rotate:
    name: Rotate universe
    runs-on: ubuntu-latest
    environment: production
    # 45 min: covers Finnhub validation of ~50 candidates (~1 min) plus
    # subprocess backfills (~30s each × at most 3-5 new stocks). The full
    # fetch_insights for each backfill is what dominates the runtime.
    timeout-minutes: 45

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      # Same HuggingFace deps fetch_insights uses — the backfill subprocess
      # needs them.
      HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
      HUGGINGFACE_SUMMARY_MODEL: ${{ secrets.HUGGINGFACE_SUMMARY_MODEL }}
      HUGGINGFACE_PROVIDER: ${{ secrets.HUGGINGFACE_PROVIDER }}
      # And the rest of fetch_insights' source keys
      MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
      REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
      REDDIT_USER_AGENT: ${{ secrets.REDDIT_USER_AGENT }}
      MARKETWATCH_SESSION_COOKIE: ${{ secrets.MARKETWATCH_SESSION_COOKIE }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

      STOCK_REQUEST_MIN_MARKET_CAP_USD: "2000000000"
      STOCK_ROTATION_MIN_VOTES: "3"
      # Safeguard A: cap swaps per week so a single Sunday can't collapse a
      # large fraction of the universe at once. 3 == ~6% turnover/week ceiling.
      MAX_STOCK_ROTATION_SWAPS_PER_WEEK: "3"
      # Lookback for the "no recent bets" gate. Short (15d) because the
      # MAX_SWAPS cap + market-cap-asc demotion ordering together gate what
      # actually demotes — this just sizes the candidate pool the ordering
      # picks from. Shorter window means we churn out stale tickers faster.
      STOCK_DEMOTION_BET_LOOKBACK_DAYS: "15"
      PIPELINE_LOG_LEVEL: INFO

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        # CPU-only torch wheel; same pattern as fetch-insights so the
        # subprocess backfill can use FinBERT locally.
        run: pip install --extra-index-url https://download.pytorch.org/whl/cpu -r pipeline/requirements.txt

      - name: Cache HuggingFace model files
        # Same cache key shape as fetch-insights so the FinBERT model is
        # warm when the backfill subprocesses fire.
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ hashFiles('pipeline/processors/sentiment.py', 'pipeline/requirements.txt') }}
          restore-keys: |
            hf-models-

      - name: Compute rotation
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          if [ "${{ inputs.skip_backfill }}" = "true" ]; then ARGS="$ARGS --skip-backfill"; fi
          echo "running: python -m pipeline.compute_stock_rotation $ARGS"
          python -m pipeline.compute_stock_rotation $ARGS

      - name: Summary
        if: always()
        run: |
          echo "### Universe rotation" >> $GITHUB_STEP_SUMMARY
          echo "- Trigger: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- Dry run: ${{ inputs.dry_run || 'false' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Skip backfill: ${{ inputs.skip_backfill || 'false' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

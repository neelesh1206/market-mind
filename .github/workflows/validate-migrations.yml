name: Validate Migrations

on:
  pull_request:
    paths:
      - "supabase/migrations/**"
      - "supabase/config.toml"
  workflow_dispatch:

concurrency:
  group: validate-migrations-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate against local Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Start local Supabase
        run: supabase start

      - name: Apply all migrations from scratch
        # `db reset` drops the local DB, replays every migration in order.
        # Catches: SQL errors, missing dependencies, out-of-order timestamps.
        run: supabase db reset --local

      - name: Lint migrations
        run: supabase db lint --schema public --level warning
        continue-on-error: true # advisory, never fails the PR

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup

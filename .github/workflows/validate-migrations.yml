name: Validate Migrations

on:
  pull_request:
    paths:
      - "supabase/migrations/**"
      - "supabase/seed.sql"
      - "supabase/config.toml"
  workflow_dispatch:

concurrency:
  group: validate-migrations-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate against local Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase
        run: supabase start

      - name: Reset DB (applies all migrations + seed)
        run: supabase db reset

      - name: Lint migrations
        run: supabase db lint --schema public
        continue-on-error: true # advisory: log warnings but don't fail PR

      - name: Confirm 50 stocks seeded
        run: |
          count=$(supabase db query "select count(*) from public.stocks;" --csv | tail -n 1)
          echo "stocks=$count"
          if [ "$count" != "50" ]; then
            echo "::error::Expected 50 stocks seeded, found $count"
            exit 1
          fi

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup

name: Resolve Predictions

# Runs after the market closes — evaluates every prediction made for that
# trading day, sets WIN/LOSS/VOID, pays out winners, refunds VOIDs, bumps
# user profile counters.
#
# Schedule: 21:15 UTC Mon-Fri ≈ 5:15 PM EDT / 4:15 PM EST. The 15-min cushion
# after the 4 PM close gives Yahoo time to publish the day's final bar.

on:
  schedule:
    - cron: "15 21 * * 1-5"
  workflow_dispatch:
    inputs:
      date:
        description: "Resolution date in ISO format (defaults to today)."
        required: false
        type: string
      dry_run:
        description: "Skip DB writes — print computed resolutions only."
        required: false
        type: boolean
        default: false

concurrency:
  group: resolve-predictions
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve unresolved predictions
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      PIPELINE_LOG_LEVEL: INFO
      # Resolution job uses yfinance only — no Massive/HF/FRED needed.
      # Set this so config.py doesn't choke on missing-but-unused keys.
      MASSIVE_API_KEY: ""
      FINNHUB_API_KEY: ""
      FRED_API_KEY: ""
      HUGGINGFACE_API_KEY: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        # CPU-only torch wheel; same extra-index as fetch-insights for
        # consistency, even though the resolution job doesn't import torch
        # directly. The wheel is still pulled because it's listed in
        # requirements.txt — keeping resolution's install reproducible.
        run: pip install --extra-index-url https://download.pytorch.org/whl/cpu -r pipeline/requirements.txt

      - name: Run resolution
        run: |
          ARGS=""
          if [ -n "${{ inputs.date }}" ]; then ARGS="$ARGS --date ${{ inputs.date }}"; fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          echo "running: python -m pipeline.resolve_predictions $ARGS"
          python -m pipeline.resolve_predictions $ARGS

      - name: Summary
        if: always()
        run: |
          echo "### Resolution run" >> $GITHUB_STEP_SUMMARY
          echo "- Status:  ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- Date:    ${{ inputs.date || '(today)' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Dry run: ${{ inputs.dry_run || 'false' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Trigger: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY

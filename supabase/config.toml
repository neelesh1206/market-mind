# Supabase project config. Used by:
# - Local dev (`supabase start`)
# - CI validation (`.github/workflows/validate-migrations.yml`)
#
# The actual production project is linked via `supabase link --project-ref <ref>`.
# Project ref is in plaintext in workflows; the access token + DB password are
# the only true secrets.

project_id = "market-mind"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false

[realtime]
enabled = true

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["http://localhost:3000", "https://marketmind.neeleshkakaraparthi.dev"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[edge_runtime]
enabled = true
policy = "oneshot"

[analytics]
enabled = false
